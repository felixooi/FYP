<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Attrition Dashboard Prototype</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 50: '#f8fafc' },
                        indigo: { 600: '#4f46e5' },
                        purple: { 700: '#7e22ce' }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Utility class for icon components */
        .lucide {
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 antialiased h-screen overflow-hidden text-sm">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Custom Lucide Icon Wrapper compatible with unpkg standalone
        const IconComponent = ({ name, size = 24, className = "" }) => {
            const ref = React.useRef(null);
            React.useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width:${size}px; height:${size}px"></i>`;
                    window.lucide.createIcons({ root: ref.current });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center p-0 m-0" style={{ lineHeight: 0 }}></span>;
        };

        const LayoutDashboard = (p) => <IconComponent name="layout-dashboard" {...p} />
        const PieChart = (p) => <IconComponent name="pie-chart" {...p} />
        const UserSearch = (p) => <IconComponent name="user-search" {...p} />
        const Sliders = (p) => <IconComponent name="sliders" {...p} />
        const FileText = (p) => <IconComponent name="file-text" {...p} />
        const Users = (p) => <IconComponent name="users" {...p} />
        const AlertTriangle = (p) => <IconComponent name="alert-triangle" {...p} />
        const TrendingUp = (p) => <IconComponent name="trending-up" {...p} />
        const TrendingDown = (p) => <IconComponent name="trending-down" {...p} />
        const Download = (p) => <IconComponent name="download" {...p} />
        const ChevronRight = (p) => <IconComponent name="chevron-right" {...p} />
        const Activity = (p) => <IconComponent name="activity" {...p} />
        const Briefcase = (p) => <IconComponent name="briefcase" {...p} />
        const MapPin = (p) => <IconComponent name="map-pin" {...p} />
        const Menu = (p) => <IconComponent name="menu" {...p} />
        const X = (p) => <IconComponent name="x" {...p} />
        const Sparkles = (p) => <IconComponent name="sparkles" {...p} />
        const XCircle = (p) => <IconComponent name="x-circle" {...p} />
        const BarChart2 = (p) => <IconComponent name="bar-chart-2" {...p} />
        const Home = (p) => <IconComponent name="home" {...p} />
        const Aperture = (p) => <IconComponent name="aperture" {...p} />
        const ScanFace = (p) => <IconComponent name="scan-face" {...p} />
        const FileBarChart = (p) => <IconComponent name="file-bar-chart" {...p} />
        const MessageSquare = (p) => <IconComponent name="message-square" {...p} />
        const DollarSign = (p) => <IconComponent name="dollar-sign" {...p} />
        const Database = (p) => <IconComponent name="database" {...p} />

        // --- API Configuration ---
        const callGemini = async (prompt) => {
            console.log("Mocking AI call for:", prompt);
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("This is a simulated AI intelligent response predicting workforce behavioral metrics and recommending targeted, data-backed interventions to reduce overall portfolio attrition risk.");
                }, 1000);
            });
        };

        // --- Mock Data ---
        const DEPARTMENTS = ['Engineering', 'Sales', 'HR', 'Marketing', 'Product'];
        const INITIAL_EMPLOYEES = [
            { id: 1, name: 'Sarah Chen', role: 'Senior Engineer', dept: 'Engineering', location: 'New York', riskScore: 85, satisfaction: 4, overtime: 12, tenure: 3, lastPromo: 2.5, salaryRatio: 0.8, salary: 115000, manager: 'Alex Wong', performance: 'Exceeds Expectations' },
            { id: 2, name: 'Michael Ross', role: 'Sales Manager', dept: 'Sales', location: 'Chicago', riskScore: 45, satisfaction: 7, overtime: 5, tenure: 5, lastPromo: 1, salaryRatio: 1.0, salary: 140000, manager: 'David Kim', performance: 'Meets Expectations' },
            { id: 3, name: 'Jessica Wu', role: 'Product Owner', dept: 'Product', location: 'San Francisco', riskScore: 12, satisfaction: 9, overtime: 2, tenure: 4, lastPromo: 0.5, salaryRatio: 1.1, salary: 165000, manager: 'Elena Rodriguez', performance: 'Outstanding' },
            { id: 4, name: 'David Miller', role: 'HR Specialist', dept: 'HR', location: 'New York', riskScore: 65, satisfaction: 5, overtime: 8, tenure: 2, lastPromo: 2, salaryRatio: 0.9, salary: 75000, manager: 'Marcus Thorne', performance: 'Meets Expectations' },
            { id: 5, name: 'James Wilson', role: 'Lead Engineer', dept: 'Engineering', location: 'Remote', riskScore: 92, satisfaction: 3, overtime: 15, tenure: 6, lastPromo: 4, salaryRatio: 0.75, salary: 135000, manager: 'Alex Wong', performance: 'Needs Improvement' },
            { id: 6, name: 'Emily Davis', role: 'Marketing Lead', dept: 'Marketing', location: 'Chicago', riskScore: 28, satisfaction: 8, overtime: 4, tenure: 3, lastPromo: 1, salaryRatio: 1.05, salary: 95000, manager: 'Rachel Green', performance: 'Exceeds Expectations' },
            { id: 7, name: 'Robert Taylor', role: 'Sales Rep', dept: 'Sales', location: 'New York', riskScore: 72, satisfaction: 5, overtime: 10, tenure: 1.5, lastPromo: 1.5, salaryRatio: 0.85, salary: 65000, manager: 'Michael Ross', performance: 'Meets Expectations' },
            { id: 8, name: 'Amanda White', role: 'Engineer', dept: 'Engineering', location: 'San Francisco', riskScore: 33, satisfaction: 8, overtime: 3, tenure: 2, lastPromo: 2, salaryRatio: 1.0, salary: 110000, manager: 'Alex Wong', performance: 'Meets Expectations' },
            { id: 9, name: 'Tom Brown', role: 'Director', dept: 'Product', location: 'Remote', riskScore: 55, satisfaction: 6, overtime: 20, tenure: 8, lastPromo: 3, salaryRatio: 1.2, salary: 210000, manager: 'Elena Rodriguez', performance: 'Exceeds Expectations' },
            { id: 10, name: 'Lisa Anderson', role: 'Recruiter', dept: 'HR', location: 'Chicago', riskScore: 15, satisfaction: 9, overtime: 1, tenure: 4, lastPromo: 0.8, salaryRatio: 1.0, salary: 85000, manager: 'Marcus Thorne', performance: 'Outstanding' },
        ];

        const ATTRITION_TREND_DATA = [
            { month: 'Jul', value: 35 },
            { month: 'Aug', value: 42 },
            { month: 'Sep', value: 38 },
            { month: 'Oct', value: 45 },
            { month: 'Nov', value: 52 },
            { month: 'Dec', value: 48 },
        ];

        // --- Utility Components ---

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-md shadow-sm border border-slate-200 p-4 ${className}`}>
                {children}
            </div>
        );

        const Badge = ({ type, children }) => {
            const colors = {
                high: 'bg-red-100 text-red-700 border-red-200',
                medium: 'bg-amber-100 text-amber-700 border-amber-200',
                low: 'bg-emerald-100 text-emerald-700 border-emerald-200',
                neutral: 'bg-slate-100 text-slate-600 border-slate-200'
            };
            return (
                <span className={`px-2.5 py-0.5 rounded-full text-xs font-medium border ${colors[type] || colors.neutral}`}>
                    {children}
                </span>
            );
        };

        const ProgressBar = ({ value, max = 100, colorClass = "bg-blue-500", label }) => (
            <div className="w-full">
                {label && <div className="flex justify-between mb-1 text-xs font-medium text-slate-500"><span>{label}</span><span>{Math.round((value / max) * 100)}%</span></div>}
                <div className="w-full bg-slate-100 rounded-full h-2.5">
                    <div className={`h-2.5 rounded-full transition-all duration-500 ${colorClass}`} style={{ width: `${Math.min((value / max) * 100, 100)}%` }}></div>
                </div>
            </div>
        );

        const AIMarkdown = ({ content }) => (
            <div className="prose prose-sm prose-indigo max-w-none text-slate-600 whitespace-pre-line">
                {content}
            </div>
        );

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto flex flex-col">
                        <div className="flex justify-between items-center p-6 border-b border-slate-100">
                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 transition-colors">
                                <XCircle size={24} />
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Chart Components ---
        const LineChart = ({ data, width = 400, height = 150, lineColor = "#6366f1", areaColor = "#e0e7ff" }) => {
            const margin = { top: 25, right: 30, bottom: 35, left: 30 };
            const chartWidth = width - margin.left - margin.right;
            const chartHeight = height - margin.top - margin.bottom;

            const xMax = data.length - 1;
            const yMax = Math.max(...data.map(d => d.value)) * 1.1;
            const yMin = Math.min(...data.map(d => d.value)) * 0.8;

            const xScale = (index) => (index / xMax) * chartWidth;
            const yScale = (value) => chartHeight - ((value - yMin) / (yMax - yMin)) * chartHeight;

            let linePath = `M ${xScale(0)},${yScale(data[0].value)} `;
            for (let i = 0; i < data.length - 1; i++) {
                const x0 = xScale(i);
                const y0 = yScale(data[i].value);
                const x1 = xScale(i + 1);
                const y1 = yScale(data[i + 1].value);
                const cpX = x0 + (x1 - x0) / 2;
                linePath += `C ${cpX},${y0} ${cpX},${y1} ${x1},${y1} `;
            }

            const areaPath = `${linePath} L ${xScale(xMax)},${chartHeight} L ${xScale(0)},${chartHeight} Z`;

            return (
                <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" className="overflow-visible">
                    <defs>
                        <linearGradient id="gradientArea" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor={lineColor} stopOpacity="0.35" />
                            <stop offset="100%" stopColor={lineColor} stopOpacity="0.0" />
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="6" stdDeviation="6" floodColor={lineColor} floodOpacity="0.4" />
                        </filter>
                    </defs>
                    <g transform={`translate(${margin.left}, ${margin.top})`}>
                        {[0, 0.33, 0.66, 1].map((ratio, i) => (
                            <line key={i} x1="0" y1={chartHeight * ratio} x2={chartWidth} y2={chartHeight * ratio} stroke="#cbd5e1" strokeDasharray="4 4" strokeWidth="1" opacity="0.4" />
                        ))}

                        <path d={areaPath} fill="url(#gradientArea)" className="transition-all duration-700 ease-in-out" />
                        <path d={linePath} stroke={lineColor} strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#glow)" className="transition-all duration-700 ease-in-out" />

                        {data.map((d, i) => (
                            <g key={i} className="group transition-transform duration-300 hover:scale-125" transform={`translate(${xScale(i)}, ${yScale(d.value)})`}>
                                <circle cx="0" cy="0" r="5" fill="white" stroke={lineColor} strokeWidth="3" className="shadow-md" />
                                <circle cx="0" cy="0" r="16" fill="transparent" className="cursor-pointer" />
                                <text x="0" y="-18" textAnchor="middle" fontSize="13" fontWeight="bold" fill="#334155" className="opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                                    {d.value}
                                </text>
                            </g>
                        ))}

                        {data.map((d, i) => (
                            <text key={i} x={xScale(i)} y={chartHeight + 24} textAnchor="middle" fontSize="12" fill="#64748b" fontWeight="600">
                                {d.month}
                            </text>
                        ))}
                    </g>
                </svg>
            );
        };

        const BarChart = ({ data, width = 600, height = 200 }) => {
            const margin = { top: 20, right: 30, bottom: 40, left: 40 };
            const chartWidth = width - margin.left - margin.right;
            const chartHeight = height - margin.top - margin.bottom;

            const yMax = 100;

            // Dynamic bar width mapping evenly across the chart
            // Max width 60px to prevent huge bars if there are only 2 departments
            const maxBarWidth = 60;
            const calculatedWidth = chartWidth / data.length * 0.6;
            const barWidth = Math.min(maxBarWidth, calculatedWidth);

            // Center each bar by splitting the chart width into equal slots
            const columnWidth = chartWidth / data.length;
            const xScale = (index) => (columnWidth * index) + (columnWidth / 2);
            const yScale = (value) => chartHeight - (value / yMax) * chartHeight;

            return (
                <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`}>
                    <g transform={`translate(${margin.left}, ${margin.top})`}>
                        {[0, 0.25, 0.5, 0.75, 1].map((ratio, i) => (
                            <React.Fragment key={i}>
                                <line x1="0" y1={chartHeight - (chartHeight * ratio)} x2={chartWidth} y2={chartHeight - (chartHeight * ratio)} stroke="#f1f5f9" strokeDasharray="4 4" strokeWidth="1" />
                                <text x="-10" y={chartHeight - (chartHeight * ratio) + 3} textAnchor="end" fontSize="10" fill="#94a3b8">
                                    {Math.round(ratio * 100)}%
                                </text>
                            </React.Fragment>
                        ))}

                        {data.map((d, i) => {
                            const barHeight = chartHeight - yScale(d.value);
                            const fillColor = d.value > 50 ? '#ef4444' : d.value > 25 ? '#f97316' : '#22c55e';

                            // Adjust label position if the text is too long and overlaps
                            return (
                                <g key={i} className="group">
                                    <rect x={xScale(i) - barWidth / 2} y={yScale(d.value)} width={barWidth} height={barHeight} fill={fillColor} rx="4" ry="4" className="transition-all duration-300 hover:opacity-80 cursor-pointer" />
                                    <text x={xScale(i)} y={yScale(d.value) - 8} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#64748b" className="opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                        {d.value}%
                                    </text>
                                    <text x={xScale(i)} y={chartHeight + 20} textAnchor="middle" fontSize={data.length > 6 ? "9" : "11"} fill="#64748b" fontWeight="500">
                                        {d.label}
                                    </text>
                                </g>
                            );
                        })}
                    </g>
                </svg>
            );
        };

        // --- Panels ---

        const OverallWorkforce = ({ employees, attritionTrend }) => {
            const [aiInsight, setAiInsight] = useState(null);
            const [isLoading, setIsLoading] = useState(false);

            const stats = useMemo(() => {
                const total = employees.length;
                const highRiskEmps = employees.filter(e => e.riskScore > 70);
                const highRisk = highRiskEmps.length;
                const avgSat = (employees.reduce((acc, curr) => acc + curr.satisfaction, 0) / total).toFixed(1);
                const attritionRate = ((highRisk / total) * 100).toFixed(1);

                const lowRisk = employees.filter(e => e.riskScore <= 40).length;
                const medRisk = employees.filter(e => e.riskScore > 40 && e.riskScore <= 70).length;
                const riskDist = { low: (lowRisk / total) * 100, med: (medRisk / total) * 100, high: (highRisk / total) * 100 };

                const turnoverCost = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(highRisk * 45000);

                let topDriver = "Low Satisfaction";
                const avgOvertime = highRiskEmps.reduce((a, b) => a + b.overtime, 0) / (highRisk || 1);
                const avgSalRatio = highRiskEmps.reduce((a, b) => a + b.salaryRatio, 0) / (highRisk || 1);

                if (avgOvertime > 10) topDriver = "Severe Burnout";
                else if (avgSalRatio < 0.95) topDriver = "Below Market Comp";

                return { total, highRisk, avgSat, attritionRate, turnoverCost, topDriver, riskDist };
            }, [employees]);

            const generateBrief = async () => {
                setIsLoading(true);
                const prompt = `You are an expert HR Data Analyst. Analyze metrics: Total Employees: ${stats.total}. Write brief.`;
                const text = await callGemini(prompt);
                setAiInsight(text);
                setIsLoading(false);
            };

            return (
                <div className="space-y-4 animate-fade-in pb-6">
                    <div className="bg-gradient-to-r from-indigo-600 to-purple-700 rounded-lg p-5 text-white shadow-md">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h2 className="text-xl font-bold flex items-center gap-2">
                                    <Activity className="text-indigo-200" /> Workforce Pulse
                                </h2>
                                <p className="text-indigo-100 mt-1 text-sm">Real-time overview of organization health.</p>
                            </div>
                            <button onClick={generateBrief} disabled={isLoading} className="bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-sm px-4 py-2 rounded-lg flex items-center gap-2 transition-all font-medium disabled:opacity-50">
                                {isLoading ? <Activity className="animate-spin" size={18} /> : <Sparkles size={18} className="text-yellow-300" />}
                                {aiInsight ? 'Refresh AI Brief' : 'Generate AI Executive Brief'}
                            </button>
                        </div>
                        {aiInsight && (
                            <div className="mt-4 bg-white/10 backdrop-blur-md rounded-md p-4 border border-white/10 animate-fade-in">
                                <h4 className="text-[11px] font-bold uppercase tracking-wider text-indigo-200 mb-2 flex items-center gap-2">
                                    <Sparkles size={12} /> AI Analysis
                                </h4>
                                <p className="text-sm leading-relaxed font-medium">{aiInsight}</p>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                        <div className="bg-white rounded-md shadow-sm border border-slate-200 lg:col-span-2 flex flex-col justify-between border-t-4 border-t-rose-500 relative overflow-hidden group h-full p-4">
                            <div className="flex justify-between items-start relative z-10 mb-2">
                                <div className="flex items-center gap-2.5">
                                    <div className="w-1 h-3 bg-rose-500 rounded-full"></div>
                                    <p className="text-[11px] text-slate-500 font-bold uppercase tracking-wider">Overall Attrition Risk</p>
                                </div>
                                <div className="p-1.5 bg-rose-50 rounded-md text-rose-600 shadow-sm border border-rose-100 flex-shrink-0">
                                    <AlertTriangle size={16} />
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col justify-center relative z-10 py-1">
                                <div className="flex flex-col md:flex-row md:items-end gap-3 mb-2">
                                    <h3 className="text-4xl lg:text-5xl font-black text-slate-800 tracking-tight leading-none">
                                        {stats.attritionRate}<span className="text-2xl text-slate-400 font-bold ml-1">%</span>
                                    </h3>
                                    <div className="text-[11px] text-rose-700 font-bold flex items-center bg-rose-50 py-1 px-2 rounded-md border border-rose-200 mb-1 shadow-sm w-fit">
                                        <TrendingUp size={12} className="mr-1" /> +2.4% vs industry
                                    </div>
                                </div>

                                <div className="w-full max-w-xl mt-auto">
                                    <div className="flex justify-between text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-wide">
                                        <span>Workforce Risk Distribution</span>
                                    </div>
                                    <div className="w-full h-2 flex rounded-md overflow-hidden opacity-90 shadow-inner">
                                        <div className="bg-emerald-400 h-full transition-all duration-1000" style={{ width: `${stats.riskDist.low}%` }} title="Low Risk"></div>
                                        <div className="bg-amber-400 h-full transition-all duration-1000" style={{ width: `${stats.riskDist.med}%` }} title="Medium Risk"></div>
                                        <div className="bg-rose-500 h-full transition-all duration-1000" style={{ width: `${stats.riskDist.high}%` }} title="High Risk"></div>
                                    </div>
                                    <div className="flex justify-between text-[11px] font-semibold text-slate-500 mt-2 px-1">
                                        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-emerald-400"></span>{Math.round(stats.riskDist.low)}% Low</span>
                                        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-amber-400"></span>{Math.round(stats.riskDist.med)}% Medium</span>
                                        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-rose-500 shadow-sm shadow-rose-200"></span><span className="text-rose-600">{Math.round(stats.riskDist.high)}% High</span></span>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-slate-100 relative z-10">
                                <div className="bg-slate-50/80 rounded-md p-3 border border-slate-100 flex flex-col sm:flex-row items-start sm:items-center gap-3 transition-colors hover:bg-slate-50">
                                    <div className="p-2 bg-white rounded-md shadow-sm text-indigo-500 border border-slate-100"><Users size={16} /></div>
                                    <div>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">High Risk Talent</p>
                                        <p className="text-lg font-black text-slate-700">{stats.highRisk} <span className="text-xs font-medium text-slate-400">/ {stats.total} total</span></p>
                                    </div>
                                </div>
                                <div className="bg-slate-50/80 rounded-md p-3 border border-slate-100 flex flex-col sm:flex-row items-start sm:items-center gap-3 transition-colors hover:bg-slate-50">
                                    <div className="p-2 bg-white rounded-md shadow-sm text-purple-500 border border-slate-100"><Activity size={16} /></div>
                                    <div>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Avg Satisfaction</p>
                                        <p className="text-lg font-black text-slate-700">{stats.avgSat} <span className="text-xs font-medium text-slate-400">/ 10</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col gap-4">
                            <div className="bg-white rounded-md shadow-sm border border-slate-200 flex-1 flex flex-col justify-between p-4">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-[11px] text-slate-500 font-bold uppercase tracking-wider mb-1">Est. Turnover Cost</p>
                                        <h3 className="text-2xl font-black text-slate-800 tracking-tight">{stats.turnoverCost}</h3>
                                    </div>
                                    <div className="p-1.5 bg-emerald-50 rounded-md text-emerald-600 border border-emerald-100"><DollarSign size={16} /></div>
                                </div>

        const SimulateIntervention = ({ employees }) => {
            const [salaryBump, setSalaryBump] = useState(0);
            const [overtimeReduction, setOvertimeReduction] = useState(0);
            const [mentorship, setMentorship] = useState(false);

            const [roiAnalysis, setRoiAnalysis] = useState(null);
            const [isAnalyzingRoi, setIsAnalyzingRoi] = useState(false);

            const simulatedData = useMemo(() => {
                return employees.map(emp => {
                    let newScore = emp.riskScore;
                    if (salaryBump > 0) newScore -= (salaryBump * 1.5) * (1 / emp.salaryRatio);
                    if (overtimeReduction > 0 && emp.overtime > 5) newScore -= (emp.overtime - 5) * overtimeReduction * 0.8;
                    if (mentorship && ['Junior', 'Senior'].includes(emp.role)) newScore -= 10;
                    return { ...emp, originalRisk: emp.riskScore, newRisk: Math.max(5, Math.round(newScore)) };
                });
            }, [employees, salaryBump, overtimeReduction, mentorship]);

            const avgRiskOriginal = Math.round(employees.reduce((a, b) => a + b.riskScore, 0) / employees.length);
            const avgRiskSimulated = Math.round(simulatedData.reduce((a, b) => a + b.newRisk, 0) / simulatedData.length);
            const reduction = avgRiskOriginal - avgRiskSimulated;

            const analyzeRoi = async () => {
                setIsAnalyzingRoi(true);
                const prompt = `HR Simulation Analysis: User proposes ${salaryBump}% salary increase, ${overtimeReduction}hr overtime reduction, Mentorship: ${mentorship}. Projected risk score reduction: ${reduction} points. Analyze the financial ROI vs long-term cultural impact. Is this sustainable? Provide a concise summary.`;
                const result = await callGemini(prompt);
                setRoiAnalysis(result);
                setIsAnalyzingRoi(false);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in pb-8">
                    <div className="lg:col-span-1 space-y-6">
                        <Card className="bg-indigo-900 text-white border-none">
                            <h3 className="text-xl font-bold mb-2">Simulation Controls</h3>
                            <p className="text-indigo-200 text-sm mb-6">Adjust variables to see predicted impact on attrition.</p>
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-sm font-medium mb-2 flex justify-between"><span>Salary Increase</span><span className="text-indigo-300">+{salaryBump}%</span></label>
                                    <input type="range" min="0" max="20" step="1" value={salaryBump} onChange={e => { setSalaryBump(Number(e.target.value)); setRoiAnalysis(null); }} className="w-full h-2 bg-indigo-700 rounded-lg appearance-none cursor-pointer" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-2 flex justify-between"><span>Reduce Overtime</span><span className="text-indigo-300">-{overtimeReduction} hrs</span></label>
                                    <input type="range" min="0" max="10" step="1" value={overtimeReduction} onChange={e => { setOvertimeReduction(Number(e.target.value)); setRoiAnalysis(null); }} className="w-full h-2 bg-indigo-700 rounded-lg appearance-none cursor-pointer" />
                                </div>
                                <div className="flex items-center justify-between bg-indigo-800 p-3 rounded-lg">
                                    <span className="text-sm">Implement Mentorship</span>
                                    <button onClick={() => { setMentorship(!mentorship); setRoiAnalysis(null); }} className={`w-12 h-6 rounded-full relative transition-colors ${mentorship ? 'bg-emerald-400' : 'bg-slate-600'}`}>
                                        <div className={`absolute top-1 left-1 bg-white w-4 h-4 rounded-full transition-transform ${mentorship ? 'translate-x-6' : ''}`}></div>
                                    </button>
                                </div>
                            </div>
                            <div className="mt-8 pt-6 border-t border-indigo-700">
                                <div className="text-sm text-indigo-300 mb-1">Projected Risk Reduction</div>
                                <div className="text-3xl font-bold text-emerald-400">-{reduction}%</div>
                            </div>
                        </Card>
                    </div>
                    <div className="lg:col-span-2 space-y-4">
                        <Card className="h-full flex flex-col">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-semibold text-slate-800">Projected Outcomes</h3>
                                <button
                                    onClick={analyzeRoi}
                                    disabled={isAnalyzingRoi}
                                    className="text-sm bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg font-medium hover:bg-indigo-100 flex items-center gap-2"
                                >
                                    {isAnalyzingRoi ? <Activity className="animate-spin" size={14} /> : <Sparkles size={14} />}
                                    Analyze ROI & Culture Impact
                                </button>
                            </div>

                            {roiAnalysis && (
                                <div className="mb-6 bg-slate-50 p-4 rounded-lg border border-slate-200 animate-fade-in">
                                    <h4 className="text-sm font-bold text-indigo-800 flex items-center gap-2 mb-2"><DollarSign size={14} /> ROI Prediction</h4>
                                    <AIMarkdown content={roiAnalysis} />
                                </div>
                            )}

                            <div className="overflow-x-auto flex-1">
                                <table className="min-w-full text-sm text-left text-slate-500">
                                    <thead className="text-xs text-slate-700 uppercase bg-slate-50">
                                        <tr><th className="px-4 py-3">Employee</th><th className="px-4 py-3">Current</th><th className="px-4 py-3">Simulated</th><th className="px-4 py-3">Change</th></tr>
                                    </thead>
                                    <tbody>
                                        {simulatedData.slice(0, 8).map((emp) => (
                                            <tr key={emp.id} className="border-b border-slate-100 hover:bg-slate-50">
                                                <td className="px-4 py-3 font-medium text-slate-900">{emp.name}</td>
                                                <td className="px-4 py-3"><span className={`px-2 py-1 rounded text-xs ${emp.originalRisk > 50 ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-600'}`}>{emp.originalRisk}%</span></td>
                                                <td className="px-4 py-3 font-bold text-slate-800">{emp.newRisk}%</td>
                                                <td className="px-4 py-3"><span className="text-emerald-600 flex items-center"><TrendingDown size={14} className="mr-1" /> {emp.originalRisk - emp.newRisk}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    </div>
                </div>
            );
        };

        const GenerateReports = () => {
            const [isGenerating, setIsGenerating] = useState(false);
            const [lastGenerated, setLastGenerated] = useState(null);

            const handleGenerate = () => {
                setIsGenerating(true);
                setTimeout(() => { setIsGenerating(false); setLastGenerated(new Date().toLocaleTimeString()); }, 1500);
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6 animate-fade-in pb-8">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {[{ title: "Monthly Forecast", desc: "Breakdown of high-risk trends." }, { title: "Strategy Impact", desc: "Simulation ROI analysis." }, { title: "Satisfaction Pulse", desc: "Survey data correlation." }, { title: "Compensation Audit", desc: "Market rate comparison." }].map((report, i) => (
                            <Card key={i} className="hover:border-indigo-300 transition-colors group cursor-pointer p-4">
                                <div className="flex justify-between items-start">
                                    <div className="p-2.5 bg-indigo-50 text-indigo-600 rounded-lg group-hover:bg-indigo-600 group-hover:text-white transition-colors"><FileText size={20} /></div>
                                    <button onClick={handleGenerate} className="text-slate-400 hover:text-indigo-600"><Download size={18} /></button>
                                </div>
                                <h4 className="mt-4 font-bold text-[15px] text-slate-800">{report.title}</h4>
                                <p className="mt-1.5 text-[13px] text-slate-500">{report.desc}</p>
                            </Card>
                        ))}
                    </div>
                    {isGenerating && <div className="fixed bottom-4 right-4 bg-slate-900 text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-3 animate-bounce"><Activity className="animate-spin" size={20} /><span>Generating report...</span></div>}
                    {lastGenerated && !isGenerating && <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 p-4 rounded-lg flex items-center justify-between"><span className="flex items-center"><Users size={18} className="mr-2" /> Generated at {lastGenerated}</span><button className="text-sm font-semibold hover:underline">Download PDF</button></div>}
                </div>
            );
        };

        const DataUpload = ({ onUpload }) => {
            const [isDragging, setIsDragging] = useState(false);
            const fileInputRef = React.useRef(null);

            const handleFile = (file) => {
                if (file) {
                    onUpload(file);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    handleFile(e.dataTransfer.files[0]);
                }
            };

            return (
                <div className="flex flex-col h-screen w-full bg-slate-50 text-slate-800 items-center justify-center p-6 relative overflow-hidden animate-fade-in">

                    <div className="z-10 w-full max-w-[640px]">

                        <div className="bg-white border text-center border-slate-200 shadow-xl rounded-2xl overflow-hidden animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                            <div className="bg-[#0f172a] p-10 relative">
                                {/* Gradient line at the very top */}
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>

                                <div className="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner border border-slate-700/50">
                                    <Database size={28} className="text-indigo-200" />
                                </div>
                                <h1 className="text-3xl font-black text-white mb-3 tracking-tight">Data Ingestion Engine</h1>
                                <p className="text-slate-400 text-[15px] font-medium max-w-md mx-auto leading-relaxed">Securely connect your HRIS export to generate predictive attrition insights and XAI recommendations.</p>
                            </div>

                            <div className="p-10">
                                <input
                                    type="file"
                                    ref={fileInputRef}
                                    className="hidden"
                                    accept=".csv,.xlsx,.json"
                                    onChange={(e) => {
                                        if (e.target.files && e.target.files.length > 0) {
                                            handleFile(e.target.files[0]);
                                        }
                                    }}
                                />
                                <div
                                    className={`border-2 border-dashed rounded-xl p-12 mb-8 flex flex-col items-center justify-center transition-all cursor-pointer ${isDragging ? 'border-indigo-500 bg-indigo-50' : 'border-slate-300 hover:border-indigo-400 hover:bg-slate-50'}`}
                                    onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                                    onDragLeave={() => setIsDragging(false)}
                                    onDrop={handleDrop}
                                    onClick={() => fileInputRef.current.click()}
                                >
                                    <div className="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mb-6 shadow-sm group-hover:scale-110 transition-transform">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="text-indigo-500"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-2">Drag & Drop Dataset</h3>
                                    <p className="text-slate-500 text-sm font-medium mb-6">or click to browse local files</p>
                                    <div className="px-4 py-1.5 border border-slate-200 rounded-md text-xs font-bold text-slate-500 tracking-wide bg-white shadow-sm">
                                        Supports .CSV, .XLSX (Max 50MB)
                                    </div>
                                </div>

                                <div className="flex justify-center items-center gap-6 text-[13px] text-slate-500 font-medium">
                                    <span className="flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-500"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> SOC2 Compliant</span>
                                    <span className="flex items-center gap-2"><FileText size={16} className="text-indigo-400" /> Workday / BambooHR Ready</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProcessingScreen = ({ message, progress = 50 }) => {
            return (
                <div className="flex flex-col h-screen w-full bg-slate-50 text-slate-800 items-center justify-center p-6 relative overflow-hidden animate-fade-in">
                    <div className="z-10 w-full max-w-[540px]">
                        <div className="bg-white border text-center border-slate-200 shadow-xl rounded-2xl overflow-hidden animate-fade-in-up">

                            <div className="bg-[#0f172a] p-10 relative">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
                                <div className="w-20 h-20 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner border border-indigo-500/30 text-indigo-400">
                                    <Aperture size={36} className="animate-spin" style={{ animationDuration: '3s' }} />
                                </div>
                                <h2 className="text-2xl font-black text-white mb-2 tracking-tight">Running Data Pipeline</h2>
                                <p className="text-indigo-200 text-sm font-medium h-5">{message}</p>
                            </div>

                            <div className="p-10">
                                <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden border border-slate-200 shadow-inner">
                                    <div className="bg-gradient-to-r from-indigo-500 to-purple-500 h-2.5 rounded-full transition-all duration-500 ease-out" style={{ width: `${progress}%` }}></div>
                                </div>
                                <div className="flex justify-between text-[11px] font-bold text-slate-500 mt-4 uppercase tracking-wider">
                                    <span>Processing...</span>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            )
        }

        const App = () => {

            const [appState, setAppState] = useState('upload'); // 'upload', 'processing', 'dashboard'
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [appData, setAppData] = useState(INITIAL_EMPLOYEES);
            const [attritionTrend, setAttritionTrend] = useState(ATTRITION_TREND_DATA);
            const [processingMessage, setProcessingMessage] = useState('');

            const handleUploadStart = async (file) => {
                setAppState('processing');
                setProcessingMessage('Uploading file to backend...');

                try {
                    const formData = new FormData();
                    formData.append("file", file);

                    setProcessingMessage('Running ML inference pipeline... (this might take a moment)');

                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();

                    if (data.status === 'success') {
                        setProcessingMessage('Mapping response data...');
                        console.log("Backend response received:", data);
                        setAppData(data.employees);
                        if (data.attrition_trend) {
                            setAttritionTrend(data.attrition_trend);
                        }
                        // Delay slightly so user sees the success state transition
                        setTimeout(() => setAppState('dashboard'), 800);
                    } else {
                        alert(`Backend error: ${data.message}`);
                        setAppState('upload');
                    }
                } catch (error) {
                    console.error("Integration Error", error);
                    alert(`Failed to connect to backend: ${error.message}\nMake sure the FastAPI server is running! Using mock data instead.`);
                    setAppData(INITIAL_EMPLOYEES);
                    setAttritionTrend(ATTRITION_TREND_DATA);
                    setAppState('dashboard');
                }
            };

            const pageHeaders = {
                'dashboard': { title: 'Overall View', subtitle: 'Strategic overview of attrition risks and regrettable turnover.' },
                'segments': { title: 'Analyze Segments', subtitle: 'Dynamic cohort analysis to identify systemic management or role issues.' },
                'individual': { title: 'Individual Profile', subtitle: 'Detailed profile dossiers and risk trajectories for 1:1 planning.' },
                'simulate': { title: 'Simulate Intervention', subtitle: 'Targeted financial models and Net ROI calculators for CFO pitches.' },
                'reports': { title: 'Generate Reports', subtitle: 'Configure and export tailored intelligence packs for stakeholders.' },
            };

            const menuItems = [
                { id: 'dashboard', label: 'Overall View', icon: Home },
                { id: 'segments', label: 'Analyze Segments', icon: Activity },
                { id: 'individual', label: 'Individual Profile', icon: Aperture },
                { id: 'simulate', label: 'Simulate Intervention', icon: ScanFace },
                { id: 'reports', label: 'Generate Reports', icon: FileBarChart },
            ];

            const renderContent = () => {
                switch (activeTab) {
                    case 'dashboard': return <OverallWorkforce employees={appData} attritionTrend={attritionTrend} />;
                    case 'segments': return <AnalyzeSegments employees={appData} />;
                    case 'individual': return <IndividualInspect employees={appData} />;
                    case 'simulate': return <SimulateIntervention employees={appData} />;
                    case 'reports': return <GenerateReports />;
                    default: return <OverallWorkforce employees={appData} attritionTrend={attritionTrend} />;
                }
            };

            if (appState === 'upload') {
                return <DataUpload onUpload={handleUploadStart} />;
            }
            if (appState === 'processing') {
                return <ProcessingScreen message={processingMessage} />;
            }

            return (
                <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden animate-fade-in">
                    <aside className="hidden md:flex flex-col w-64 bg-slate-900 text-slate-300">
                        <div className="p-5 flex items-center space-x-3 text-white"><div className="p-1.5 bg-indigo-600 rounded-md"><Activity size={20} /></div><span className="text-lg font-bold tracking-tight">Retention<span className="text-indigo-400">AI</span></span></div>
                        <nav className="flex-1 px-4 py-6 space-y-2">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center space-x-3.5 px-3 py-3 rounded-lg transition-all text-[15px] ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-md font-semibold' : 'hover:bg-slate-800 hover:text-white text-slate-400 font-medium'}`}>
                                    <item.icon size={20} className={activeTab === item.id ? 'text-white' : 'text-slate-400'} /><span className="tracking-wide">{item.label}</span>{activeTab === item.id && <ChevronRight size={18} className="ml-auto" />}
                                </button>
                            ))}
                        </nav>
                    </aside>
                    <main className="flex-1 overflow-y-auto md:p-8 p-4 relative">
                        <div className="max-w-[1600px] mx-auto w-full">
                            <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 pb-4 border-b border-slate-200">
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-800">{pageHeaders[activeTab].title}</h1>
                                    <p className="text-slate-500 mt-1">{pageHeaders[activeTab].subtitle}</p>
                                </div>
                                <div className="text-sm font-medium text-slate-400 mt-4 md:mt-0">
                                    Last updated: Today, 10:30 AM
                                </div>
                            </div>
                            {renderContent()}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
